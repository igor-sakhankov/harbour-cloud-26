spring.application.name=cloud
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration

# Toxiproxy (port 9091) proxies to this app itself, so Spring Boot's TCP readiness
# check on 9091 would deadlock (upstream not up yet). Skip the check entirely —
# Toxiproxy starts in <1s so it's always ready before the app context loads.
spring.docker.compose.readiness.wait=never

# Toxiproxy sits in front of this app on port 9091 — callers should use that port
# to route through the proxy and experience injected network conditions.
# To inject latency:  POST http://localhost:8474/proxies/spring-boot-app/toxics
#   {"name":"latency","type":"latency","attributes":{"latency":2000,"jitter":500}}
# To simulate timeout: use type "timeout" with {"timeout":0}
# To reset:            DELETE http://localhost:8474/proxies/spring-boot-app/toxics/latency

# Sharded Postgres datasources.
# shard-count drives the routing hash; add matching shard[N] entries for each shard.
app.db.shard-count=2
app.db.shards[0].url=jdbc:postgresql://localhost:5432/payments
app.db.shards[0].username=postgres
app.db.shards[0].password=postgres
app.db.shards[1].url=jdbc:postgresql://localhost:5433/payments
app.db.shards[1].username=postgres
app.db.shards[1].password=postgres
