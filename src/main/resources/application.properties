spring.application.name=cloud

# Payment processor is proxied through Toxiproxy for network fault simulation.
# To inject latency:  POST http://localhost:8474/proxies/payment-processor/toxics
#   {"name":"latency","type":"latency","attributes":{"latency":2000,"jitter":500}}
# To simulate timeout: use type "timeout" with {"timeout":0}
# To reset:            DELETE http://localhost:8474/proxies/payment-processor/toxics/latency
payment.processor.url=http://localhost:9091
