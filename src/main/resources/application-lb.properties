# --- Redirect load balancer profile (activated by --spring.profiles.active=lb) ---
spring.application.name=load-balancer

# Run the balancer on its own port, distinct from the backend instances.
server.port=8090

# The balancer has no datastore and must not try to start docker-compose.
spring.docker.compose.enabled=false

# Static instance discovery: the backend payment app instances to balance over.
lb.instances=http://localhost:8081,http://localhost:8082

# Active health checks: probe each instance's actuator health endpoint.
lb.health-path=/actuator/health
lb.interval=2s
lb.timeout=1s

# Threshold-based, non-flapping state machine (fed by both active probes and
# passive POST /lb/report calls): eject after N consecutive failures, re-admit
# only after M consecutive successes.
lb.unhealthy-after=2
lb.healthy-after=2
