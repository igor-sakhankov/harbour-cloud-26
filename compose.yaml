services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:latest
    ports:
      - "8474:8474"   # Toxiproxy REST API — add/remove toxics here
      - "9091:9091"   # Proxy port — callers hit this instead of the app directly
    volumes:
      - ./toxiproxy.json:/toxiproxy.json
    command: ["-config", "/toxiproxy.json", "-host", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "/toxiproxy-cli", "list"]
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 1s

  postgres-0:
    image: postgres:16
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  postgres-1:
    image: postgres:16
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
